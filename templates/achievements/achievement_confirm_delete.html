{% extends 'base.html' %}

{% block title %}Delete Achievement - FitQuest{% endblock %}

{% block content %}
<div class="px-4 py-8">
    <div class="max-w-2xl mx-auto">
        <div class="bg-white shadow rounded-lg p-8 text-center">
            <svg class="mx-auto h-12 w-12 text-red-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
            </svg>
            <h2 class="mt-4 text-2xl font-bold text-gray-900">Delete Achievement</h2>
            <p class="mt-2 text-gray-600">Are you sure you want to delete <span class="font-bold text-gray-900">{{ object.name }}</span>? This action cannot be undone.</p>

            <form method="post" class="mt-8 flex justify-center space-x-4">
                {% csrf_token %}
                <a href="{% url 'all_achievements' %}" class="inline-flex items-center px-4 py-2 border border-gray-300 shadow-sm text-sm font-medium rounded-md text-gray-700 bg-white hover:bg-gray-50">
                    Cancel
                </a>
                <button type="submit" class="inline-flex items-center px-4 py-2 border border-transparent shadow-sm text-sm font-medium rounded-md text-white bg-red-600 hover:bg-red-700">
                    Delete Achievement
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
