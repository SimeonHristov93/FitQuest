{% extends 'base.html' %}

{% block title %}Delete Challenge - FitQuest{% endblock %}

{% block content %}
<div class="px-4 py-8">
    <div class="max-w-md mx-auto">
        <div class="bg-white shadow rounded-lg">
            <div class="px-4 py-5 sm:px-6 border-b border-gray-200">
                <h2 class="text-2xl font-bold text-red-600">Delete Challenge</h2>
            </div>

            <div class="px-4 py-5 sm:p-6">
                <div class="mb-6">
                    <svg class="mx-auto h-12 w-12 text-red-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
                    </svg>
                    <h3 class="mt-4 text-lg font-medium text-gray-900 text-center">Are you sure?</h3>
                    <p class="mt-2 text-sm text-gray-500 text-center">
                        This action cannot be undone. This will permanently delete the challenge and all associated data.
                    </p>
                </div>

                <form method="post" class="space-y-4">
                    {% csrf_token %}

                    <div class="flex gap-3">
                        <a href="{% url 'challenge_list' %}" class="flex-1 inline-flex justify-center py-2 px-4 border border-gray-300 shadow-sm text-sm font-medium rounded-md text-gray-700 bg-white hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500">
                            Cancel
                        </a>
                        <button type="submit" class="flex-1 inline-flex justify-center py-2 px-4 border border-transparent shadow-sm text-sm font-medium rounded-md text-white bg-red-600 hover:bg-red-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-red-500">
                            Delete
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
